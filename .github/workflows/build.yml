name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build OpenWrt Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare package source
        run: |
          mkdir -p package/luci-proto-isc-dhclient-ipv4
          cp -r Makefile files package/luci-proto-isc-dhclient-ipv4/

      - name: Build package
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: x86_64-23.05.0
          PACKAGES: luci-proto-isc-dhclient-ipv4
          V: s

      - name: Show built packages
        run: |
          ls -R bin/packages/ || true
          find bin/packages/ -name "*.ipk"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-proto-isc-dhclient-ipv4-ipk
          path: bin/packages/**/*.ipk
          if-no-files-found: error

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/packages/**/*.ipk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
